apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: servstorecredentials.storage.servstore.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.0
spec:
  group: storage.servstore.io
  names:
    kind: ServStoreCredential
    listKind: ServStoreCredentialList
    plural: servstorecredentials
    singular: servstorecredential
    shortNames: ["sscred"]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Cluster
      type: string
      jsonPath: .spec.clusterRef
    - name: Secret
      type: string
      jsonPath: .spec.secretRef
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: ["clusterRef", "secretRef"]
            properties:
              clusterRef:
                type: string
                description: Name of the ServStoreCluster in the same namespace.
              secretRef:
                type: string
                description: Name of the Kubernetes Secret containing access-key and secret-key fields.
              username:
                type: string
                description: ServStore username to bind this policy to (defaults to secretRef name).
              policy:
                type: string
                description: |
                  JSON IAM-style policy document. Example:
                  {"Effect":"Allow","Action":["s3:*"],"Resource":["*"]}
                  If omitted, full access is granted.
          status:
            type: object
            properties:
              phase:
                type: string
                enum: [Pending, Synced, Failed]
              lastSyncTime:
                type: string
                format: date-time
              message:
                type: string
