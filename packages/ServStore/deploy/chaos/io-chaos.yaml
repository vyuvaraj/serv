apiVersion: chaos-mesh.org/v1alpha1
kind: IOChaos
metadata:
  name: servstore-io-latency
  namespace: default
spec:
  action: mixed
  mode: one
  selector:
    labelSelectors:
      'app.kubernetes.io/name': 'servstore'
  volumeMountPath: /data
  delay:
    read: '500ms'
    write: '500ms'
  errno: 5 # EIO input/output error
  percent: 10
  duration: '5m'
  scheduler:
    cron: '*/20 * * * *'
