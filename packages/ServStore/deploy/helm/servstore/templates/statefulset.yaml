apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "servstore.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "servstore.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "servstore.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  # Rolling upgrade: replace one pod at a time, wait for Ready before proceeding.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      {{- include "servstore.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "servstore.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "servstore.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      # Pod anti-affinity: spread nodes across Kubernetes hosts for HA
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  {{- include "servstore.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
        {{- with .Values.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: servstore
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          {{- toYaml .Values.containerSecurityContext | nindent 10 }}
        ports:
        - name: s3
          containerPort: {{ .Values.containerPort }}
          protocol: TCP
        args:
        - "--port={{ .Values.containerPort }}"
        - "--data-dir={{ .Values.dataDir }}"
        {{- if .Values.auth.enabled }}
        - "--auth"
        - "--access-key=$(ACCESS_KEY)"
        - "--secret-key=$(SECRET_KEY)"
        {{- end }}
        {{- if .Values.encryption.enabled }}
        - "--encryption-key=$(ENCRYPTION_KEY)"
        {{- end }}
        {{- if .Values.tls.enabled }}
        - "--tls-cert=/tls/tls.crt"
        - "--tls-key=/tls/tls.key"
        {{- end }}
        {{- if .Values.erasureCoding.enabled }}
        - "--erasure-coding"
        - "--data-shards={{ .Values.erasureCoding.dataShards }}"
        - "--parity-shards={{ .Values.erasureCoding.parityShards }}"
        {{- else }}
        - "--replication-factor={{ .Values.replicationFactor }}"
        {{- end }}
        {{- if gt (int .Values.rateLimit.requestsPerSecond) 0 }}
        - "--rate-limit-rps={{ .Values.rateLimit.requestsPerSecond }}"
        - "--rate-limit-burst={{ .Values.rateLimit.burst }}"
        {{- end }}
        # Peer discovery via headless Service DNS
        - "--node-addr=$(POD_NAME).{{ include "servstore.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.containerPort }}"
        - "--node-id=$(POD_NAME)"
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        {{- if .Values.auth.enabled }}
        - name: ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.auth.existingSecret }}{{ .Values.auth.existingSecret }}{{ else }}{{ include "servstore.fullname" . }}-auth{{ end }}
              key: access-key
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.auth.existingSecret }}{{ .Values.auth.existingSecret }}{{ else }}{{ include "servstore.fullname" . }}-auth{{ end }}
              key: secret-key
        {{- end }}
        {{- if .Values.encryption.enabled }}
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.encryption.existingSecret }}{{ .Values.encryption.existingSecret }}{{ else }}{{ include "servstore.fullname" . }}-encryption{{ end }}
              key: {{ .Values.encryption.secretKey }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /metrics
            port: s3
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /metrics
            port: s3
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: data
          mountPath: {{ .Values.dataDir }}
        {{- if .Values.tls.enabled }}
        - name: tls
          mountPath: /tls
          readOnly: true
        {{- end }}
      volumes:
      {{- if .Values.tls.enabled }}
      - name: tls
        secret:
          secretName: {{ .Values.tls.secretName }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [{{ .Values.persistence.accessMode | quote }}]
      {{- if .Values.persistence.storageClassName }}
      storageClassName: {{ .Values.persistence.storageClassName | quote }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.persistence.size }}
  {{- else }}
  # Ephemeral data volume (not recommended for production)
      volumes:
      - name: data
        emptyDir: {}
  {{- end }}
