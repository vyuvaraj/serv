<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ServStore Console</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
                        #0f111a;
            height: 100vh;
            overflow: hidden;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            padding: 40px;
            background: rgba(26, 29, 46, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 28px;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent 40%, rgba(99, 102, 241, 0.1), transparent 60%);
            animation: rotate-border 12s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes rotate-border {
            100% { transform: rotate(360deg); }
        }

        .login-header {
            text-align: center;
            z-index: 1;
        }

        .login-logo {
            width: 50px;
            height: 50px;
            background: var(--primary-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            margin: 0 auto 16px;
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .login-header h1 {
            font-family: var(--font-heading);
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1;
        }

        .form-group-login {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }

        .form-group-login label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            transition: var(--transition-smooth);
        }

        .input-wrapper input {
            width: 100%;
            background-color: rgba(15, 17, 26, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 14px 14px 14px 42px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 14px;
            transition: var(--transition-smooth);
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: rgba(15, 17, 26, 0.8);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.15);
        }

        .input-wrapper input:focus + i {
            color: var(--primary-color);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            border: none;
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.35);
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover {
            box-shadow: 0 4px 25px rgba(99, 102, 241, 0.55);
            transform: translateY(-1px);
        }

        .oidc-divider {
            display: none; /* dynamically shown */
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            margin: 10px 0;
            z-index: 1;
        }

        .oidc-divider::before, .oidc-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .oidc-divider:not(:empty)::before {
            margin-right: .5em;
        }

        .oidc-divider:not(:empty)::after {
            margin-left: .5em;
        }

        .btn-oidc {
            display: none; /* dynamically shown */
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            transition: var(--transition-smooth);
            align-items: center;
            justify-content: center;
            gap: 8px;
            z-index: 1;
            text-decoration: none;
        }

        .btn-oidc:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fa-solid fa-box-archive"></i>
                </div>
                <h1>ServStore</h1>
                <p id="login-subtitle">Sign in to console dashboard</p>
            </div>

            <form id="login-form" class="login-form" onsubmit="handleLogin(event)">
                <div class="form-group-login">
                    <label for="username">Username / Access Key</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" required autocomplete="username" placeholder="Enter username...">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>

                <div class="form-group-login">
                    <label for="password">Password / Secret Key</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>

                <button type="submit" id="btn-submit" class="btn-login">
                    <span>Sign In</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <div id="oidc-div" class="oidc-divider">Or continue with</div>
            <a href="/console/oauth/login" id="btn-oidc-login" class="btn-oidc">
                <i class="fa-brands fa-openid" style="color: #f78c40;"></i>
                <span>Single Sign-On (OIDC)</span>
            </a>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation';
            toast.innerHTML = `
                <i class="fa-solid ${icon}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        async function detectConfig() {
            try {
                const res = await fetch('/console/auth-config');
                if (res.ok) {
                    const data = await res.json();
                    if (data.oidcEnabled) {
                        document.getElementById('oidc-div').style.display = 'flex';
                        document.getElementById('btn-oidc-login').style.display = 'flex';
                    }
                    if (data.ldapEnabled) {
                        document.getElementById('login-subtitle').innerText = 'Sign in with Local or LDAP credentials';
                    }
                }
            } catch (err) {
                console.error("Failed to fetch auth configuration:", err);
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('btn-submit');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Signing in...';

            try {
                const res = await fetch('/console/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                if (res.ok) {
                    const data = await res.json();
                    // Store token in localStorage
                    localStorage.setItem('token', data.token);
                    // Also redirect to console root
                    window.location.href = '/';
                } else {
                    showToast('Invalid credentials. Please try again.', 'error');
                }
            } catch (err) {
                showToast('Network error, please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Sign In</span> <i class="fa-solid fa-arrow-right"></i>';
            }
        }

        // Initialize configuration detection
        detectConfig();
    </script>
</body>
</html>
