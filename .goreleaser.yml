project_name: servdb
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: servdb
    main: .
    binary: servdb
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.Date}}

archives:
  - id: servdb
    builds: [servdb]
    name_template: "servdb_{{.Version}}_{{.Os}}_{{.Arch}}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

dockers:
  - image_templates:
      - "ghcr.io/vyuvaraj/servdb:{{.Tag}}"
      - "ghcr.io/vyuvaraj/servdb:latest"
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--label=org.opencontainers.image.title=ServDB"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.source=https://github.com/vyuvaraj/ServDB"

brews:
  - name: servdb
    repository:
      owner: vyuvaraj
      name: homebrew-serv
    homepage: "https://github.com/vyuvaraj/ServDB"
    description: "Distributed database service from the ServVerse platform"
    license: "Apache-2.0"
    install: |
      bin.install "servdb"
    test: |
      system "#{bin}/servdb", "--version"

scoops:
  - repository:
      owner: vyuvaraj
      name: scoop-serv
    homepage: "https://github.com/vyuvaraj/ServDB"
    description: "Distributed database service from the ServVerse platform"
    license: "Apache-2.0"
